name: rider
description: Taxi app — rider (passenger) app. Android, Arabic RTL.
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  # Design system + theme-mode plumbing (ThemeController, TaxiApp). Everything
  # visual comes from here; screens never hardcode design values.
  shared:
    path: ../../packages/shared
  # State management standard (see CLAUDE.md).
  provider: ^6.1.0
  # HTTP client for the API (with a JWT interceptor).
  dio: ^5.7.0
  # Secure JWT storage (Keychain / Keystore).
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Golden tests load the real Cairo font (bundled in the shared package) the
  # same way the shared design-system goldens do.
  google_fonts: ^6.2.1

flutter:
  uses-material-design: true
