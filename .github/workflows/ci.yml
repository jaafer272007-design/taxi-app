name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    name: services/api (build, migrate, test)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/api

    # Required to boot the app / run migrations. WhatsApp & FCM vars are left
    # absent ON PURPOSE so the DEV-fallback paths (OTP-to-console, push-to-log)
    # are exercised — that is expected in CI.
    env:
      DATABASE_URL: postgresql://taxi:taxi@localhost:5432/taxi_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-dummy-jwt-secret-not-for-production-0123456789
      TZ: Asia/Baghdad
      NODE_ENV: test

    services:
      # Match local dev (services/api/docker-compose.yml): PostGIS + Redis.
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: taxi
          POSTGRES_PASSWORD: taxi
          POSTGRES_DB: taxi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taxi -d taxi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No engines/.nvmrc in the repo → Node 20 LTS.
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Lint (if a lint script exists)
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  # Renders the design system to PNG "golden" screenshots so the UI can be
  # reviewed with zero local install, and guards against unintended visual
  # changes. Independent of the services/api job above.
  ui-goldens:
    name: packages/shared (flutter golden UI)
    runs-on: ubuntu-latest

    # Needed to commit the generated screenshots back to the PR branch.
    permissions:
      contents: write

    steps:
      - name: Checkout (PR branch head, so screenshots can be pushed back)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      # Pin the Flutter stable version — goldens are renderer/font sensitive, so
      # the version that GENERATES baselines must match the one that COMPARES.
      - name: Set up Flutter (pinned stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.0
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        working-directory: packages/shared
        run: flutter pub get

      - name: Decide golden mode
        id: mode
        working-directory: packages/shared
        run: |
          # Compare (regression guard) when baselines already exist; otherwise
          # generate them. A commit message containing [update-goldens] forces
          # regeneration (use it to bless an intended UI change).
          if ls test/goldens/*.png >/dev/null 2>&1 \
             && ! git log -1 --pretty=%B | grep -qF '[update-goldens]'; then
            echo "update=false" >> "$GITHUB_OUTPUT"
            echo "Baselines present -> comparison (visual regression guard)."
          else
            echo "update=true" >> "$GITHUB_OUTPUT"
            echo "Missing baselines or [update-goldens] -> generating."
          fi

      - name: Test + golden regression check
        if: steps.mode.outputs.update == 'false'
        working-directory: packages/shared
        run: flutter test

      - name: Test + generate golden baselines
        if: steps.mode.outputs.update == 'true'
        working-directory: packages/shared
        run: flutter test --update-goldens

      - name: Mirror screenshots into docs/ui-screenshots (for inline PR viewing)
        if: steps.mode.outputs.update == 'true'
        run: |
          mkdir -p docs/ui-screenshots
          cp packages/shared/test/goldens/*.png docs/ui-screenshots/

      - name: Commit screenshots back to the PR branch
        if: steps.mode.outputs.update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/shared/test/goldens docs/ui-screenshots
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit."
          else
            git commit -m "chore(ci): generate UI golden screenshots [skip ci]"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      # Always publish the screenshots + any failure/diff images, even on
      # success, so they can be downloaded from the run.
      - name: Upload UI screenshots + diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: |
            packages/shared/test/goldens/**
            packages/shared/test/failures/**
          if-no-files-found: warn

  # Compile-checks the rider app (which depends on the shared package) and runs
  # its smoke test. Keeps the app buildable as we wire it up screen by screen.
  rider-app:
    name: apps/rider (flutter analyze + test)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/rider

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter (pinned stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.0
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
