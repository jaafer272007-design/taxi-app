name: shared
description: Taxi app shared design system — theme tokens + base widget library (rider, driver, admin).
publish_to: none
version: 0.1.0

# Color.withValues() (used in the widget tints) needs Flutter 3.27+.
environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Arabic-first type scale.
  google_fonts: ^6.2.1
  # Vector icon set (no emoji), Dart-3 compatible. All icon refs are isolated
  # in lib/widgets/app_icons.dart — swapping the icon pack touches that file
  # only. (The older `lucide_icons` package is Dart-2-only, so we use the
  # maintained `lucide_icons_flutter` fork; the class is still `LucideIcons`.)
  lucide_icons_flutter: ^3.1.15
  # Persists the chosen theme mode (light/dark/system) across restarts.
  shared_preferences: ^2.5.0
  # App-wide state management standard (ChangeNotifier + provider). TaxiApp
  # exposes controllers to the tree; see CLAUDE.md → State management.
  provider: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # Cairo is bundled (not fetched at runtime): google_fonts discovers these by
  # filename, so GoogleFonts.cairo() loads the local asset in the apps (offline,
  # no network) and in golden tests (deterministic, real Arabic/Latin glyphs).
  # OFL 1.1 — see assets/fonts/OFL.txt.
  assets:
    - assets/fonts/
